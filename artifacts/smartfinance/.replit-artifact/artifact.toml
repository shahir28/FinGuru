kind = "web"
previewPath = "/"
title = "SmartFinance AI"
version = "1.0.0"
id = "artifacts/smartfinance"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22803

[services.development]
run = "pnpm --filter @workspace/smartfinance run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/smartfinance", "run", "build" ]
publicDir = "artifacts/smartfinance/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22803"
BASE_PATH = "/"
